<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal Website Builder CMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">CMS</span><div><strong>Universal Builder</strong><small>AI HTML/CSS/Asset CMS</small></div></div>
      <div class="project-actions">
        <button id="newProjectBtn">新規</button>
        <button id="clearProjectBtn">全消去</button>
      </div>
      <label class="drop-zone" id="dropZone">
        <input id="fileInput" type="file" multiple webkitdirectory />
        <span>HTML / CSS / 画像をドロップ<br><b>またはフォルダをインポート</b></span>
      </label>
      <div class="tree-head"><span>VirtualFS</span><button id="addPageBtn">+ Page</button></div>
      <nav id="fileTree" class="file-tree" aria-label="ファイルツリー"></nav>
      <section class="inspector">
        <h2>選択要素</h2>
        <div id="selectionEmpty" class="muted">プレビュー内のテキスト・画像をクリックしてください。</div>
        <div id="selectionPanel" hidden>
          <label>UID<input id="uidField" readonly /></label>
          <label id="textEditorWrap">テキスト<textarea id="textEditor" rows="6"></textarea></label>
          <label id="imageEditorWrap">画像<input id="imageEditor" type="file" accept="image/*,video/*" /></label>
          <button id="deleteEditBtn" class="danger">この編集だけ破棄</button>
        </div>
      </section>
    </aside>

    <main class="workspace">
      <header class="toolbar">
        <div class="toolbar-group">
          <button class="device active" data-width="100%">Desktop</button>
          <button class="device" data-width="768px">Tablet</button>
          <button class="device" data-width="375px">Mobile</button>
        </div>
        <div class="active-path" id="activePath">index.html</div>
        <div class="toolbar-group">
          <button id="importBtn">Import</button>
          <button id="exportBtn" class="primary">Export ZIP</button>
        </div>
      </header>
      <section class="preview-stage">
        <iframe id="previewFrame" title="Website preview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </section>
    </main>
  </div>

  <template id="starterTemplate"><!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sample AI Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <nav><a href="index.html">Home</a><a href="about.html">About</a></nav>
    <h1>AIが生成したサイトを安全に編集</h1>
    <p>data-uidを軸に、人間の修正を新しいAIテンプレートへマージします。</p>
    <img src="https://placehold.co/900x420/4f46e5/ffffff?text=Drop+your+assets" alt="hero">
  </header>
</body>
</html></template>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
