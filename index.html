<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Two Builder - Standalone CMS</title>
  <style>
    :root {
      --sky: #4AABDB;
      --sky-dark: #2289bc;
      --peach: #F0A882;
      --peach-dark: #df8b60;
      --white: #FFFFFF;
      --ivory: #FDF8F4;
      --cream: #FFF7ED;
      --text: #444444;
      --muted: #7a8493;
      --line: #e8edf3;
      --panel: rgba(255, 255, 255, 0.92);
      --shadow: 0 18px 50px rgba(74, 171, 219, 0.14);
      --shadow-strong: 0 24px 80px rgba(31, 41, 55, 0.16);
      --radius: 20px;
      --toolbar-height: 66px;
      --sidebar-width: 330px;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(74,171,219,0.20), transparent 34%),
        radial-gradient(circle at 88% 4%, rgba(240,168,130,0.22), transparent 30%),
        linear-gradient(135deg, #ffffff 0%, var(--ivory) 52%, #eef8fd 100%);
      overflow: hidden;
    }

    button, input, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 800;
      color: var(--text);
      background: var(--white);
      box-shadow: 0 6px 18px rgba(31, 41, 55, 0.08);
      cursor: pointer;
      transition: transform .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease);
      white-space: nowrap;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(31, 41, 55, 0.14); }
    button:active { transform: translateY(0); }
    .btn-primary { background: var(--sky); color: #fff; }
    .btn-peach { background: var(--peach); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,.72); border: 1px solid var(--line); }
    .btn-danger { color: #fff; background: #ef6060; }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      grid-template-rows: var(--toolbar-height) minmax(0, 1fr);
      grid-template-areas:
        "sidebar toolbar"
        "sidebar preview";
      gap: 0;
    }

    .sidebar {
      grid-area: sidebar;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 18px;
      background: rgba(255,255,255,.86);
      border-right: 1px solid rgba(232, 237, 243, .9);
      backdrop-filter: blur(18px);
      box-shadow: 12px 0 40px rgba(74, 171, 219, .08);
      z-index: 2;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 48px; height: 48px; border-radius: 17px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--sky), var(--peach));
      color: #fff; font-size: 23px; box-shadow: var(--shadow);
    }
    .brand-title { font-weight: 900; letter-spacing: .01em; }
    .brand-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .drop-zone {
      min-height: 118px;
      border: 2px dashed rgba(74,171,219,.38);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(74,171,219,.08), rgba(240,168,130,.10));
      display: grid; place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 16px;
      cursor: pointer;
      transition: .2s var(--ease);
    }
    .drop-zone strong { color: var(--sky-dark); }
    .drop-zone.dragover { background: rgba(74,171,219,.17); border-color: var(--sky); transform: scale(1.01); }
    .drop-zone input { display: none; }

    .side-row { display: flex; gap: 8px; align-items: center; }
    .side-row button { flex: 1; padding: 9px 10px; font-size: 13px; }
    .section-head { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 12px; font-weight: 900; letter-spacing: .09em; text-transform: uppercase; }

    .file-tree {
      flex: 1;
      min-height: 150px;
      overflow: auto;
      padding-right: 4px;
    }
    .file-item {
      width: 100%;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.68);
      border: 1px solid transparent;
      box-shadow: none;
      text-align: left;
      color: var(--text);
      transform: none;
    }
    .file-item:hover, .file-item.active { border-color: rgba(74,171,219,.45); background: #fff; }
    .file-item.active { box-shadow: 0 10px 24px rgba(74,171,219,.13); }
    .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 800; }
    .file-badge { color: var(--muted); font-size: 11px; }

    .inspector {
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 15px;
      box-shadow: 0 10px 30px rgba(31, 41, 55, .06);
    }
    .inspector h2 { font-size: 15px; margin: 0 0 11px; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .field { display: block; margin: 10px 0; color: var(--muted); font-size: 12px; font-weight: 800; }
    .field input, .field textarea {
      width: 100%; margin-top: 6px; padding: 10px 12px;
      border: 1px solid var(--line); border-radius: 12px;
      background: #fff; color: var(--text); outline: none;
    }
    .field textarea { min-height: 105px; resize: vertical; line-height: 1.55; }
    .field input:focus, .field textarea:focus { border-color: var(--sky); box-shadow: 0 0 0 4px rgba(74,171,219,.12); }

    .toolbar {
      grid-area: toolbar;
      min-width: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      background: rgba(255,255,255,.74);
      border-bottom: 1px solid rgba(232, 237, 243, .92);
      backdrop-filter: blur(18px);
      z-index: 1;
    }
    .toolbar-group { display: flex; gap: 8px; align-items: center; min-width: 0; }
    .device.active { background: var(--peach); color: #fff; }
    .active-path {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 900;
      color: var(--sky-dark);
      background: rgba(255,255,255,.68);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
    }

    .preview-area {
      grid-area: preview;
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .preview-shell {
      width: 100%;
      min-width: 300px;
      height: 100%;
      min-height: 520px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    #previewFrame {
      width: 100%;
      height: calc(100vh - var(--toolbar-height) - 48px);
      min-height: 520px;
      border: 0;
      border-radius: 24px;
      background: #fff;
      box-shadow: var(--shadow-strong);
      transition: width .24s var(--ease);
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      max-width: min(440px, calc(100vw - 44px));
      z-index: 50;
      padding: 13px 16px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-strong);
      color: var(--text);
      font-weight: 800;
    }
    .toast.ok { border-color: rgba(74,171,219,.38); }
    .toast.error { border-color: rgba(239,96,96,.45); color: #b42323; }

    @media (max-width: 900px) {
      :root { --sidebar-width: 290px; }
      .toolbar { flex-wrap: wrap; height: auto; min-height: var(--toolbar-height); }
      button { padding: 9px 11px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">✦</div>
        <div>
          <div class="brand-title">For Two Builder</div>
          <div class="brand-sub">Standalone AI Website CMS</div>
        </div>
      </div>

      <label id="dropZone" class="drop-zone">
        <input id="fileInput" type="file" multiple accept=".html,.htm,.css,.js,image/*,video/*" />
        <span>HTML / CSS / 画像をドロップ<br><strong>またはインポートボタンで読み込み</strong></span>
      </label>

      <div class="side-row">
        <button id="sampleBtn" class="btn-ghost">初期化</button>
        <button id="clearBtn" class="btn-danger">倉庫消去</button>
      </div>

      <div class="section-head"><span>File Tree</span><button id="addPageBtn" class="btn-ghost">+ Page</button></div>
      <nav id="fileTree" class="file-tree" aria-label="Virtual file tree"></nav>

      <section class="inspector">
        <h2>クリック編集</h2>
        <div id="emptyInspector" class="hint">中央プレビュー内の見出し・本文・画像をクリックすると、ここで編集できます。AI再インポート後も同じdata-uidへ編集を再適用します。</div>
        <div id="editPanel" hidden>
          <label class="field">data-uid<input id="uidInput" readonly /></label>
          <label id="textField" class="field">テキスト<textarea id="textInput"></textarea></label>
          <label id="assetField" class="field">画像/動画差し替え<input id="assetInput" type="file" accept="image/*,video/*" /></label>
          <div class="side-row"><button id="discardEditBtn" class="btn-ghost">編集を破棄</button></div>
        </div>
      </section>
    </aside>

    <header class="toolbar">
      <div class="toolbar-group">
        <button class="device active" data-width="100%">Desktop</button>
        <button class="device" data-width="768px">Tablet</button>
        <button class="device" data-width="375px">Mobile</button>
      </div>
      <div id="activePath" class="active-path">index.html</div>
      <div class="toolbar-group">
        <button id="importBtn" class="btn-peach">Import HTML/CSS/Assets</button>
        <button id="exportBtn" class="btn-primary">Export ZIP</button>
      </div>
    </header>

    <main class="preview-area">
      <div class="preview-shell"><iframe id="previewFrame" title="Website preview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe></div>
    </main>
  </div>

  <script>
    'use strict';

    const DEFAULT_HTML = `<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>For Two Sample Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="#contact">Contact</a>
    </nav>
    <div class="hero-grid">
      <div>
        <p class="eyebrow">For Two Builder</p>
        <h1>AIが生成したWebサイトを、ブラウザだけで直感編集。</h1>
        <p class="lead">このサンプルはIndexedDBが空でも自動生成されます。テキストや画像をクリックして編集し、HTMLを再インポートしてもuser_editsが引き継がれます。</p>
        <a class="cta" href="about.html">Aboutページへ</a>
      </div>
      <img src="https://placehold.co/920x620/4AABDB/ffffff?text=For+Two+Builder" alt="For Two Builder sample">
    </div>
  </header>
  <section id="contact" class="section">
    <h2>クリックで編集できます</h2>
    <p>h1〜h6、p、span、a、li、button、imgなどへ自動でdata-uidとdata-editableを付与します。</p>
  </section>
</body>
</html>`;

    const DEFAULT_ABOUT = DEFAULT_HTML
      .replace('For Two Sample Site', 'About - For Two Sample Site')
      .replace('AIが生成したWebサイトを、ブラウザだけで直感編集。', '複数ページでも編集モードを維持。')
      .replace('このサンプルはIndexedDBが空でも自動生成されます。テキストや画像をクリックして編集し、HTMLを再インポートしてもuser_editsが引き継がれます。', 'iframe内の内部リンクを横取りし、ビルダーのactiveFileを切り替えるため、ブラウザ遷移で編集画面から外れません。')
      .replace('<a class="cta" href="about.html">Aboutページへ</a>', '<a class="cta" href="index.html">Homeへ戻る</a>');

    const DEFAULT_CSS = `:root{--sky:#4AABDB;--peach:#F0A882;--text:#444;--ivory:#FDF8F4}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;color:var(--text);background:linear-gradient(135deg,#fff,var(--ivory))}.hero{min-height:100vh;padding:34px clamp(22px,5vw,72px)}.nav{display:flex;gap:18px;margin-bottom:64px}.nav a{font-weight:800;color:var(--sky);text-decoration:none}.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:42px;align-items:center}.eyebrow{color:var(--peach);font-weight:900;letter-spacing:.08em;text-transform:uppercase}h1{font-size:clamp(38px,6vw,76px);line-height:1.04;margin:.1em 0}.lead{font-size:clamp(17px,2vw,22px);line-height:1.9}.cta{display:inline-block;margin-top:24px;padding:14px 22px;border-radius:999px;background:var(--sky);color:white;text-decoration:none;font-weight:900}img{width:100%;border-radius:32px;box-shadow:0 28px 70px #4AABDB33}.section{padding:80px clamp(22px,5vw,72px);background:white}@media(max-width:760px){.hero-grid{grid-template-columns:1fr}.nav{margin-bottom:36px;flex-wrap:wrap}}`;

    const DB_NAME = 'for_two_standalone_builder';
    const DB_VERSION = 1;
    const EDITABLE_SELECTOR = 'h1,h2,h3,h4,h5,h6,p,span,a,button,li,img,figcaption,blockquote';

    class MemoryStore {
      constructor() { this.files = new Map(); this.assets = new Map(); this.meta = new Map(); }
      async put(store, value) { this[store].set(value.path, value); return value; }
      async get(store, path) { return this[store].get(path); }
      async all(store) { return [...this[store].values()]; }
      async clear() { this.files.clear(); this.assets.clear(); this.meta.clear(); }
    }

    class IndexedDBStore {
      constructor() { this.db = null; this.memory = new MemoryStore(); this.fallback = false; }
      async open() {
        if (!('indexedDB' in window)) { this.fallback = true; return this; }
        try {
          this.db = await new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = () => {
              const db = request.result;
              ['files', 'assets', 'meta'].forEach(name => {
                if (!db.objectStoreNames.contains(name)) db.createObjectStore(name, { keyPath: 'path' });
              });
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
            request.onblocked = () => reject(new Error('IndexedDB upgrade was blocked.'));
          });
        } catch (error) {
          console.warn('IndexedDB unavailable. Falling back to in-memory VFS.', error);
          this.fallback = true;
        }
        return this;
      }
      objectStore(name, mode = 'readonly') { return this.db.transaction(name, mode).objectStore(name); }
      async put(store, value) {
        if (this.fallback) return this.memory.put(store, value);
        return new Promise((resolve, reject) => {
          const request = this.objectStore(store, 'readwrite').put(value);
          request.onsuccess = () => resolve(value);
          request.onerror = () => reject(request.error);
        });
      }
      async get(store, path) {
        if (this.fallback) return this.memory.get(store, path);
        return new Promise((resolve, reject) => {
          const request = this.objectStore(store).get(path);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }
      async all(store) {
        if (this.fallback) return this.memory.all(store);
        return new Promise((resolve, reject) => {
          const request = this.objectStore(store).getAll();
          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error);
        });
      }
      async clear() {
        if (this.fallback) return this.memory.clear();
        await Promise.all(['files', 'assets', 'meta'].map(store => new Promise((resolve, reject) => {
          const request = this.objectStore(store, 'readwrite').clear();
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        })));
      }
    }

    class VirtualFS {
      constructor(store) {
        this.store = store;
        this.files = new Map();
        this.assets = new Map();
        this.meta = { path: 'project', activeFile: 'index.html', user_edits: {} };
      }
      async boot() {
        try {
          const [files, assets, meta] = await Promise.all([
            this.store.all('files'),
            this.store.all('assets'),
            this.store.get('meta', 'project')
          ]);
          files.forEach(file => this.files.set(file.path, file));
          assets.forEach(asset => this.assets.set(asset.path, asset));
          if (meta && typeof meta === 'object') this.meta = { ...this.meta, ...meta, user_edits: meta.user_edits || {} };
        } catch (error) {
          console.warn('VFS load failed. Rebuilding default project.', error);
          this.files.clear();
          this.assets.clear();
          this.meta = { path: 'project', activeFile: 'index.html', user_edits: {} };
        }
        if (!this.files.has('index.html')) await this.createDefaultProject(false);
      }
      async createDefaultProject(clearEdits = true) {
        if (clearEdits) this.meta.user_edits = {};
        await this.writeText('index.html', DEFAULT_HTML, 'text/html');
        await this.writeText('about.html', DEFAULT_ABOUT, 'text/html');
        await this.writeText('style.css', DEFAULT_CSS, 'text/css');
        this.meta.activeFile = 'index.html';
        await this.saveMeta();
      }
      async saveMeta() { await this.store.put('meta', this.meta); }
      async writeText(path, template_code, type = 'text/plain') {
        const record = { path: sanitizePath(path), kind: 'file', type, template_code, updatedAt: Date.now() };
        this.files.set(record.path, record);
        await this.store.put('files', record);
        return record;
      }
      async writeAsset(path, blob, type = 'application/octet-stream') {
        const record = { path: sanitizePath(path), kind: 'asset', type, blob, updatedAt: Date.now() };
        this.assets.set(record.path, record);
        await this.store.put('assets', record);
        return record;
      }
      async importFiles(fileList) {
        const files = [...fileList];
        let firstHtml = '';
        for (const file of files) {
          const sourcePath = sanitizePath(file.webkitRelativePath || file.name);
          const isAsset = /\.(png|jpe?g|gif|webp|svg|avif|mp4|webm|mov|mp3|wav)$/i.test(sourcePath) || file.type.startsWith('image/') || file.type.startsWith('video/');
          if (isAsset) {
            const assetPath = sourcePath.startsWith('assets/') ? sourcePath : `assets/images/${file.name}`;
            await this.writeAsset(assetPath, file, file.type || 'application/octet-stream');
          } else {
            const text = await file.text();
            const type = sourcePath.endsWith('.html') || sourcePath.endsWith('.htm') ? 'text/html' : sourcePath.endsWith('.css') ? 'text/css' : sourcePath.endsWith('.js') ? 'text/javascript' : file.type || 'text/plain';
            const path = sourcePath.endsWith('.htm') ? sourcePath.replace(/\.htm$/i, '.html') : sourcePath;
            await this.writeText(path, text, type);
            if (!firstHtml && path.endsWith('.html')) firstHtml = path;
          }
        }
        if (firstHtml) this.meta.activeFile = firstHtml;
        await this.saveMeta();
        return { count: files.length, firstHtml };
      }
      htmlFiles() { return [...this.files.values()].filter(file => file.path.endsWith('.html')).sort(sortByPath); }
      allEntries() { return [...this.files.values(), ...this.assets.values()].sort(sortByPath); }
    }

    class BuilderApp {
      constructor() {
        this.store = new IndexedDBStore();
        this.vfs = null;
        this.activeUid = '';
        this.blobUrls = [];
        this.$ = selector => document.querySelector(selector);
      }
      async init() {
        await this.store.open();
        this.vfs = new VirtualFS(this.store);
        await this.vfs.boot();
        this.bindEvents();
        this.renderTree();
        await this.setActiveFile(this.vfs.meta.activeFile || 'index.html', false);
        this.toast(this.store.fallback ? 'IndexedDBが使えないためメモリ倉庫で起動しました' : 'For Two Builderを起動しました', 'ok');
      }
      bindEvents() {
        this.$('#importBtn').addEventListener('click', () => this.$('#fileInput').click());
        this.$('#fileInput').addEventListener('change', event => this.handleImport(event.target.files));
        this.$('#exportBtn').addEventListener('click', () => this.exportZip());
        this.$('#sampleBtn').addEventListener('click', async () => { await this.vfs.createDefaultProject(true); await this.setActiveFile('index.html'); this.toast('初期サンプルを再生成しました', 'ok'); });
        this.$('#clearBtn').addEventListener('click', async () => {
          if (!confirm('IndexedDB/メモリ倉庫を消去して初期サンプルを作り直しますか？')) return;
          await this.store.clear();
          this.vfs = new VirtualFS(this.store);
          await this.vfs.createDefaultProject(true);
          await this.setActiveFile('index.html');
          this.toast('倉庫を初期化しました', 'ok');
        });
        this.$('#addPageBtn').addEventListener('click', async () => {
          const name = prompt('追加するHTMLファイル名', 'new-page.html');
          if (!name) return;
          const path = sanitizePath(name.endsWith('.html') ? name : `${name}.html`);
          await this.vfs.writeText(path, DEFAULT_HTML.replace('For Two Sample Site', path), 'text/html');
          await this.setActiveFile(path);
          this.toast(`${path} を追加しました`, 'ok');
        });
        this.$('#textInput').addEventListener('input', event => this.updateUserEdit({ text: event.target.value }));
        this.$('#assetInput').addEventListener('change', event => this.replaceSelectedAsset(event.target.files[0]));
        this.$('#discardEditBtn').addEventListener('click', () => this.discardSelectedEdit());
        document.querySelectorAll('.device').forEach(button => button.addEventListener('click', () => {
          document.querySelectorAll('.device').forEach(item => item.classList.remove('active'));
          button.classList.add('active');
          this.$('#previewFrame').style.width = button.dataset.width;
        }));
        const dropZone = this.$('#dropZone');
        ['dragenter', 'dragover'].forEach(name => dropZone.addEventListener(name, event => { event.preventDefault(); dropZone.classList.add('dragover'); }));
        ['dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, event => { event.preventDefault(); dropZone.classList.remove('dragover'); }));
        dropZone.addEventListener('drop', event => this.handleImport(event.dataTransfer.files));
        window.addEventListener('message', event => this.handleFrameMessage(event.data));
      }
      async handleImport(files) {
        if (!files || !files.length) return;
        try {
          const result = await this.vfs.importFiles(files);
          this.renderTree();
          if (result.firstHtml) await this.setActiveFile(result.firstHtml);
          else await this.renderPreview();
          this.toast(`${result.count}件をインポートしました`, 'ok');
        } catch (error) {
          console.error(error);
          this.toast(`インポートに失敗しました: ${error.message}`, 'error');
        }
      }
      async setActiveFile(path, persist = true) {
        const target = this.vfs.files.get(path) || this.vfs.htmlFiles()[0];
        if (!target) {
          await this.vfs.createDefaultProject(false);
          return this.setActiveFile('index.html', persist);
        }
        this.vfs.meta.activeFile = target.path;
        if (persist) await this.vfs.saveMeta();
        this.$('#activePath').textContent = target.path;
        this.renderTree();
        await this.renderPreview();
      }
      renderTree() {
        const tree = this.$('#fileTree');
        tree.innerHTML = this.vfs.allEntries().map(entry => {
          const icon = entry.kind === 'asset' ? '🖼️' : entry.path.endsWith('.html') ? '🌐' : entry.path.endsWith('.css') ? '🎨' : '📄';
          const active = entry.path === this.vfs.meta.activeFile ? ' active' : '';
          return `<button class="file-item${active}" data-path="${escapeHtml(entry.path)}"><span>${icon}</span><span class="file-name">${escapeHtml(entry.path)}</span><span class="file-badge">${entry.kind}</span></button>`;
        }).join('');
        tree.querySelectorAll('.file-item').forEach(button => button.addEventListener('click', () => {
          const path = button.dataset.path;
          if (path.endsWith('.html')) this.setActiveFile(path);
          else this.toast('HTMLファイルを選択するとプレビューが切り替わります', 'ok');
        }));
      }
      async renderPreview() {
        this.blobUrls.forEach(url => URL.revokeObjectURL(url));
        this.blobUrls = [];
        const active = this.vfs.files.get(this.vfs.meta.activeFile) || this.vfs.htmlFiles()[0];
        if (!active) return;
        const html = await this.composePreviewHtml(active.template_code, active.path, true);
        const frame = this.$('#previewFrame');
        frame.srcdoc = html;
      }
      async composePreviewHtml(templateCode, path, includeBridge) {
        const doc = new DOMParser().parseFromString(templateCode, 'text/html');
        this.injectEditableAttributes(doc, path);
        this.applyUserEdits(doc);
        await this.inlineCssAndResolveAssets(doc, path);
        if (includeBridge) this.injectPreviewBridge(doc);
        return `<!doctype html>\n${doc.documentElement.outerHTML}`;
      }
      injectEditableAttributes(doc, path) {
        let index = 0;
        doc.querySelectorAll(EDITABLE_SELECTOR).forEach(element => {
          if (!element.dataset.uid) {
            const stableParts = [path, element.tagName.toLowerCase(), element.id || '', String(element.className || ''), normalizedText(element).slice(0, 48), index++];
            element.dataset.uid = `uid_${hash(stableParts.join('|'))}`;
          }
          element.dataset.editable = element.tagName === 'IMG' ? 'image' : 'text';
        });
      }
      applyUserEdits(doc) {
        Object.entries(this.vfs.meta.user_edits || {}).forEach(([uid, edit]) => {
          const element = doc.querySelector(`[data-uid="${cssEscape(uid)}"]`);
          if (!element) return;
          if (edit.text !== undefined && element.dataset.editable === 'text') element.textContent = edit.text;
          if (edit.src && element.tagName === 'IMG') element.setAttribute('src', edit.src);
          if (edit.alt && element.tagName === 'IMG') element.setAttribute('alt', edit.alt);
        });
      }
      async inlineCssAndResolveAssets(doc, htmlPath) {
        const assetMap = new Map();
        for (const asset of this.vfs.assets.values()) {
          const objectUrl = URL.createObjectURL(asset.blob);
          this.blobUrls.push(objectUrl);
          assetMap.set(asset.path, objectUrl);
          assetMap.set(asset.path.split('/').pop(), objectUrl);
        }
        doc.querySelectorAll('img,video,source').forEach(element => {
          const src = element.getAttribute('src');
          if (!src) return;
          const normalized = normalizeRelativePath(htmlPath, src);
          if (assetMap.has(src)) element.setAttribute('src', assetMap.get(src));
          else if (assetMap.has(normalized)) element.setAttribute('src', assetMap.get(normalized));
        });
        doc.querySelectorAll('link[rel="stylesheet"][href]').forEach(link => {
          const href = link.getAttribute('href');
          const cssFile = this.vfs.files.get(href) || this.vfs.files.get(normalizeRelativePath(htmlPath, href));
          if (!cssFile) return;
          const style = doc.createElement('style');
          style.textContent = cssFile.template_code;
          link.replaceWith(style);
        });
      }
      injectPreviewBridge(doc) {
        const style = doc.createElement('style');
        style.textContent = '[data-editable]{cursor:pointer}[data-builder-selected]{outline:3px solid #4AABDB!important;outline-offset:4px!important;border-radius:6px!important}';
        doc.head.appendChild(style);
        const script = doc.createElement('script');
        script.textContent = `(() => {\n  document.addEventListener('click', event => {\n    const editable = event.target.closest('[data-editable]');\n    if (editable) {\n      event.preventDefault();\n      event.stopPropagation();\n      document.querySelectorAll('[data-builder-selected]').forEach(node => node.removeAttribute('data-builder-selected'));\n      editable.setAttribute('data-builder-selected', '');\n      parent.postMessage({ type: 'builder-select', uid: editable.dataset.uid, editable: editable.dataset.editable, text: editable.textContent, src: editable.getAttribute('src') || '', alt: editable.getAttribute('alt') || '' }, '*');\n      return;\n    }\n    const link = event.target.closest('a[href]');\n    if (!link) return;\n    const href = link.getAttribute('href');\n    if (!href || href.startsWith('#') || /^(https?:|mailto:|tel:|javascript:)/i.test(href)) return;\n    event.preventDefault();\n    parent.postMessage({ type: 'builder-navigate', href }, '*');\n  }, true);\n})();`;
        doc.body.appendChild(script);
      }
      handleFrameMessage(message) {
        if (!message || typeof message !== 'object') return;
        if (message.type === 'builder-select') this.selectElement(message);
        if (message.type === 'builder-navigate') {
          const nextPath = normalizeRelativePath(this.vfs.meta.activeFile, message.href);
          if (this.vfs.files.has(nextPath)) this.setActiveFile(nextPath);
          else this.toast(`未登録ページです: ${nextPath}`, 'error');
        }
      }
      selectElement(data) {
        this.activeUid = data.uid;
        this.$('#emptyInspector').hidden = true;
        this.$('#editPanel').hidden = false;
        this.$('#uidInput').value = data.uid;
        this.$('#textField').hidden = data.editable !== 'text';
        this.$('#assetField').hidden = data.editable !== 'image';
        this.$('#textInput').value = data.text || '';
      }
      async updateUserEdit(patch) {
        if (!this.activeUid) return;
        this.vfs.meta.user_edits[this.activeUid] = { ...(this.vfs.meta.user_edits[this.activeUid] || {}), ...patch, updatedAt: Date.now() };
        await this.vfs.saveMeta();
        await this.renderPreview();
      }
      async replaceSelectedAsset(file) {
        if (!file || !this.activeUid) return;
        const path = `assets/images/${Date.now()}-${sanitizePath(file.name).split('/').pop()}`;
        await this.vfs.writeAsset(path, file, file.type || 'application/octet-stream');
        await this.updateUserEdit({ src: path, alt: file.name });
        this.renderTree();
        this.toast('画像を差し替えました', 'ok');
      }
      async discardSelectedEdit() {
        if (!this.activeUid) return;
        delete this.vfs.meta.user_edits[this.activeUid];
        await this.vfs.saveMeta();
        await this.renderPreview();
        this.toast('選択要素の編集を破棄しました', 'ok');
      }
      async exportZip() {
        try {
          const zip = new SimpleZip();
          for (const file of this.vfs.files.values()) {
            const content = file.path.endsWith('.html') ? await this.composePreviewHtml(file.template_code, file.path, false) : file.template_code;
            zip.addText(file.path, content);
          }
          for (const asset of this.vfs.assets.values()) zip.addBlob(asset.path, asset.blob);
          zip.addText('builder-user-edits.json', JSON.stringify(this.vfs.meta.user_edits, null, 2));
          const blob = await zip.generate();
          downloadBlob(blob, 'for-two-builder-export.zip');
          this.toast('ZIPを書き出しました', 'ok');
        } catch (error) {
          console.error(error);
          this.toast(`エクスポートに失敗しました: ${error.message}`, 'error');
        }
      }
      toast(message, type = '') {
        const node = document.createElement('div');
        node.className = `toast ${type}`;
        node.textContent = message;
        document.body.appendChild(node);
        setTimeout(() => node.remove(), 3200);
      }
    }

    class SimpleZip {
      constructor() { this.entries = []; }
      addText(path, text) { this.entries.push({ path: sanitizePath(path), dataPromise: Promise.resolve(new TextEncoder().encode(text)) }); }
      addBlob(path, blob) { this.entries.push({ path: sanitizePath(path), dataPromise: blob.arrayBuffer().then(buffer => new Uint8Array(buffer)) }); }
      async generate() {
        const localParts = [];
        const centralParts = [];
        let offset = 0;
        for (const entry of this.entries) {
          const data = await entry.dataPromise;
          const name = new TextEncoder().encode(entry.path);
          const crc = crc32(data);
          const local = concatBytes(u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0), u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), name, data);
          localParts.push(local);
          const central = concatBytes(u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0), u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset), name);
          centralParts.push(central);
          offset += local.length;
        }
        const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
        const end = concatBytes(u32(0x06054b50), u16(0), u16(0), u16(this.entries.length), u16(this.entries.length), u32(centralSize), u32(offset), u16(0));
        return new Blob([...localParts, ...centralParts, end], { type: 'application/zip' });
      }
    }

    function sanitizePath(path) { return String(path || '').replace(/\\/g, '/').replace(/^\/+/, '').replace(/\.\.\//g, '').trim() || 'index.html'; }
    function sortByPath(a, b) { return a.path.localeCompare(b.path); }
    function normalizedText(element) { return (element.getAttribute('alt') || element.textContent || element.getAttribute('src') || '').replace(/\s+/g, ' ').trim(); }
    function hash(input) { let h = 2166136261; for (let i = 0; i < input.length; i += 1) { h ^= input.charCodeAt(i); h = Math.imul(h, 16777619); } return (h >>> 0).toString(36); }
    function cssEscape(value) { if (window.CSS && CSS.escape) return CSS.escape(value); return String(value).replace(/[^a-zA-Z0-9_-]/g, '\\$&'); }
    function escapeHtml(value) { return String(value).replace(/[&<>"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char])); }
    function normalizeRelativePath(basePath, href) {
      try { return new URL(href, `https://builder.local/${basePath.replace(/[^/]*$/, '')}`).pathname.slice(1); }
      catch { return sanitizePath(href); }
    }
    function downloadBlob(blob, filename) {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(link.href), 1200);
    }
    function u16(value) { const bytes = new Uint8Array(2); new DataView(bytes.buffer).setUint16(0, value, true); return bytes; }
    function u32(value) { const bytes = new Uint8Array(4); new DataView(bytes.buffer).setUint32(0, value >>> 0, true); return bytes; }
    function concatBytes(...arrays) { const size = arrays.reduce((sum, item) => sum + item.length, 0); const out = new Uint8Array(size); let offset = 0; arrays.forEach(item => { out.set(item, offset); offset += item.length; }); return out; }
    const CRC_TABLE = (() => { const table = new Uint32Array(256); for (let n = 0; n < 256; n += 1) { let c = n; for (let k = 0; k < 8; k += 1) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1; table[n] = c >>> 0; } return table; })();
    function crc32(data) { let c = 0xffffffff; for (let i = 0; i < data.length; i += 1) c = CRC_TABLE[(c ^ data[i]) & 0xff] ^ (c >>> 8); return (c ^ 0xffffffff) >>> 0; }

    window.addEventListener('DOMContentLoaded', () => {
      new BuilderApp().init().catch(error => {
        console.error(error);
        document.body.innerHTML = `<div style="padding:32px;font-family:system-ui;color:#444;background:#FDF8F4;min-height:100vh"><h1>For Two Builder</h1><p>起動時に問題が発生しましたが、ページを再読み込みすると初期サンプルを再生成します。</p><pre>${escapeHtml(error.message)}</pre></div>`;
      });
    });
  </script>
</body>
</html>
